<!DOCTYPE html>

<html lang="pt-br" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>Cadastro de Roupas</title>
    <link rel="stylesheet" href="style.css">
</head>


<body>
<h1>Cadastro de Roupas</h1>

<form id="formCliente">
    <input type="number" id="codigoCliente" placeholder="Código" readonly>
    <input type="text" id="nomeCliente" placeholder="Nome completo do Cliente" required>
    <input type="date" id="dataNascimento" placeholder="Data Nascimento">
    <input type="text" id="cpf" placeholder="CPF do Cliente" required>
    <input type="text" id="numeroTelefone" placeholder="Telefone para contato">
    <input type="text" id="email" placeholder="e-mail para contato">
    <textarea id="observacoes" placeholder="Observações"></textarea>

    <button type="submit">Cadastrar</button>
    <button id="btnAtualizar" type="button">Atualizar</button>
    <button id="btnApagar" type="button">Apagar</button>
</form>

<hr>

<div id="acoes">
    <button id="btnListarTodos" type="button">Listar todos os Clientes</button>

    <input type="number" id="buscarCodigo" placeholder="Ou buscar por código">

</div>

<hr>

<table id="tabelaRoupas">
    <thead>
        <tr>
            <th>Código</th>
            <th>Nome</th>
            <th>Data de Nascimento</th>
            <th>CPF</th>
            <th>Telefone</th>
            <th>e-mail</th>
            <th>Observações</th>
        </tr>
    </thead>

    <tbody>       
    </tbody>

</table>

<script src="script.js"></script>
</body>
</html>
